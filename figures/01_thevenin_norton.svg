<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" role="img" width="100%">
  <title>Équivalence Thévenin-Norton</title>
  <desc>Deux représentations équivalentes d'un même dipôle linéaire : source de tension en série avec résistance, ou source de courant en parallèle avec résistance.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #3d3d3a; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; fill: #6c6b66; }
    .th { font-size: 14px; font-weight: 500; }

    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   .th, .c-blue   .t { fill: #0C447C; }
    .c-blue   .ts { fill: #185FA5; }

    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   .th, .c-teal   .t { fill: #085041; }
    .c-teal   .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th, .c-purple .t { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  .th, .c-amber  .t { fill: #633806; }
    .c-amber  .ts { fill: #854F0B; }

    .c-gray   rect, .c-gray   circle, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   .th, .c-gray   .t { fill: #444441; }
    .c-gray   .ts { fill: #5F5E5A; }

    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral  .th, .c-coral  .t { fill: #712B13; }
    .c-coral  .ts { fill: #993C1D; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="c-blue"><rect x="40" y="50" width="260" height="180" rx="12" stroke-width="0.5"/></g>
  <text class="th" x="170" y="78" text-anchor="middle">Thévenin</text>
  <text class="ts" x="170" y="96" text-anchor="middle">Source de tension en série</text>

  <line x1="80" y1="140" x2="80" y2="125" stroke="#3d3d3a" stroke-width="1.5"/>
  <circle cx="80" cy="160" r="16" fill="none" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="80" y="164" text-anchor="middle">Vth</text>
  <line x1="80" y1="176" x2="80" y2="200" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="80" y1="125" x2="180" y2="125" stroke="#3d3d3a" stroke-width="1.5"/>
  <rect x="180" y="118" width="40" height="14" fill="#FFFFFF" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="200" y="112" text-anchor="middle">Rth</text>
  <line x1="220" y1="125" x2="260" y2="125" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="260" y1="125" x2="260" y2="155" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="80" y1="200" x2="260" y2="200" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="260" y1="180" x2="260" y2="200" stroke="#3d3d3a" stroke-width="1.5"/>
  <circle cx="260" cy="155" r="3" fill="#3d3d3a"/>
  <circle cx="260" cy="180" r="3" fill="#3d3d3a"/>
  <text class="ts" x="275" y="159">A</text>
  <text class="ts" x="275" y="184">B</text>

  <text class="th" x="340" y="148" text-anchor="middle">⇔</text>

  <g class="c-teal"><rect x="380" y="50" width="260" height="180" rx="12" stroke-width="0.5"/></g>
  <text class="th" x="510" y="78" text-anchor="middle">Norton</text>
  <text class="ts" x="510" y="96" text-anchor="middle">Source de courant en parallèle</text>

  <line x1="430" y1="125" x2="430" y2="145" stroke="#3d3d3a" stroke-width="1.5"/>
  <circle cx="430" cy="160" r="16" fill="none" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="430" y="164" text-anchor="middle">In</text>
  <line x1="430" y1="172" x2="430" y2="152" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="430" y1="176" x2="430" y2="200" stroke="#3d3d3a" stroke-width="1.5"/>

  <line x1="520" y1="125" x2="520" y2="148" stroke="#3d3d3a" stroke-width="1.5"/>
  <rect x="508" y="148" width="24" height="34" fill="#FFFFFF" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="546" y="168">Rn</text>
  <line x1="520" y1="182" x2="520" y2="200" stroke="#3d3d3a" stroke-width="1.5"/>

  <line x1="430" y1="125" x2="600" y2="125" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="430" y1="200" x2="600" y2="200" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="600" y1="125" x2="600" y2="155" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="600" y1="180" x2="600" y2="200" stroke="#3d3d3a" stroke-width="1.5"/>
  <circle cx="600" cy="155" r="3" fill="#3d3d3a"/>
  <circle cx="600" cy="180" r="3" fill="#3d3d3a"/>
  <text class="ts" x="615" y="159">A</text>
  <text class="ts" x="615" y="184">B</text>

  <text class="ts" x="340" y="258" text-anchor="middle">Vth = In · Rn        Rth = Rn</text>

</svg>
