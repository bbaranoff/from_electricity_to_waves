<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" role="img" width="100%">
  <title>Addition 01 + 01 = 10</title>
  <desc>Deux additionneurs complets chaînés par la retenue. FA0 traite le bit de poids faible avec A0=B0=1 et produit S0=0, report=1. FA1 reçoit ce report avec A1=B1=0 et produit S1=1, report final=0.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #3d3d3a; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; fill: #6c6b66; }
    .th { font-size: 14px; font-weight: 500; }

    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   .th, .c-blue   .t { fill: #0C447C; }
    .c-blue   .ts { fill: #185FA5; }

    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   .th, .c-teal   .t { fill: #085041; }
    .c-teal   .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th, .c-purple .t { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  .th, .c-amber  .t { fill: #633806; }
    .c-amber  .ts { fill: #854F0B; }

    .c-gray   rect, .c-gray   circle, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   .th, .c-gray   .t { fill: #444441; }
    .c-gray   .ts { fill: #5F5E5A; }

    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral  .th, .c-coral  .t { fill: #712B13; }
    .c-coral  .ts { fill: #993C1D; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="40" text-anchor="middle">Additionneur 2 bits — opération 01 + 01</text>

  <g class="c-purple"><rect x="100" y="100" width="160" height="100" rx="8" stroke-width="0.5"/></g>
  <text class="th" x="180" y="138" text-anchor="middle">FA bit 0</text>
  <text class="ts" x="180" y="158" text-anchor="middle">XOR + AND + OR</text>

  <line x1="140" y1="70" x2="140" y2="100" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="140" y="62" text-anchor="middle">A₀ = 1</text>

  <line x1="220" y1="70" x2="220" y2="100" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="220" y="62" text-anchor="middle">B₀ = 1</text>

  <line x1="60" y1="150" x2="100" y2="150" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="56" y="142" text-anchor="end">Cin = 0</text>

  <line x1="180" y1="200" x2="180" y2="240" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="180" y="256" text-anchor="middle">S₀ = 0</text>

  <line x1="260" y1="150" x2="400" y2="150" stroke="#993C1D" stroke-width="2" marker-end="url(#arrow)"/>
  <text class="ts" x="330" y="142" text-anchor="middle">report = 1</text>

  <g class="c-purple"><rect x="400" y="100" width="160" height="100" rx="8" stroke-width="0.5"/></g>
  <text class="th" x="480" y="138" text-anchor="middle">FA bit 1</text>
  <text class="ts" x="480" y="158" text-anchor="middle">XOR + AND + OR</text>

  <line x1="440" y1="70" x2="440" y2="100" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="440" y="62" text-anchor="middle">A₁ = 0</text>

  <line x1="520" y1="70" x2="520" y2="100" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="520" y="62" text-anchor="middle">B₁ = 0</text>

  <line x1="480" y1="200" x2="480" y2="240" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="480" y="256" text-anchor="middle">S₁ = 1</text>

  <line x1="560" y1="150" x2="610" y2="150" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="616" y="154" text-anchor="start">Cout = 0</text>

  <text class="th" x="340" y="294" text-anchor="middle">S₁ S₀ = 10 = 2</text>

</svg>
