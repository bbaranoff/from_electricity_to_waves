<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img" width="100%">
  <title>Architecture LTE end-to-end</title>
  <desc>Du UE au serveur Internet via eNB, MME (contrôle), S-GW et P-GW (user plane), puis SGi vers Internet. X2 relie les eNB entre eux pour la mobilité et la coordination.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #3d3d3a; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; fill: #6c6b66; }
    .th { font-size: 14px; font-weight: 500; }

    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   .th, .c-blue   .t { fill: #0C447C; }
    .c-blue   .ts { fill: #185FA5; }

    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   .th, .c-teal   .t { fill: #085041; }
    .c-teal   .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th, .c-purple .t { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  .th, .c-amber  .t { fill: #633806; }
    .c-amber  .ts { fill: #854F0B; }

    .c-gray   rect, .c-gray   circle, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   .th, .c-gray   .t { fill: #444441; }
    .c-gray   .ts { fill: #5F5E5A; }

    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral  .th, .c-coral  .t { fill: #712B13; }
    .c-coral  .ts { fill: #993C1D; }

    .c-pink   rect, .c-pink   circle, .c-pink   ellipse { fill: #FBEAF0; stroke: #993556; }
    .c-pink   .th, .c-pink   .t { fill: #72243E; }
    .c-pink   .ts { fill: #993556; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="32" text-anchor="middle">Architecture LTE — du téléphone au serveur Internet</text>

  <g class="c-amber"><rect x="156" y="62" width="80" height="48" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="196" y="84" text-anchor="middle">MME</text>
  <text class="ts" x="196" y="100" text-anchor="middle">plan contrôle</text>

  <line x1="196" y1="110" x2="196" y2="160" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="ts" x="208" y="138" text-anchor="start">S1-MME</text>

  <g class="c-purple"><rect x="60" y="160" width="80" height="60" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="100" y="184" text-anchor="middle">UE</text>
  <text class="ts" x="100" y="202" text-anchor="middle">téléphone</text>

  <line x1="140" y1="190" x2="156" y2="190" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="148" y="180" text-anchor="middle">Uu</text>

  <g class="c-purple"><rect x="156" y="160" width="80" height="60" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="196" y="184" text-anchor="middle">eNB</text>
  <text class="ts" x="196" y="202" text-anchor="middle">station base</text>

  <line x1="236" y1="190" x2="252" y2="190" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="244" y="180" text-anchor="middle">S1-U</text>

  <g class="c-teal"><rect x="252" y="160" width="80" height="60" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="292" y="184" text-anchor="middle">S-GW</text>
  <text class="ts" x="292" y="202" text-anchor="middle">passerelle</text>

  <line x1="332" y1="190" x2="348" y2="190" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="340" y="180" text-anchor="middle">S5</text>

  <g class="c-teal"><rect x="348" y="160" width="80" height="60" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="388" y="184" text-anchor="middle">P-GW</text>
  <text class="ts" x="388" y="202" text-anchor="middle">anchor IP</text>

  <line x1="428" y1="190" x2="444" y2="190" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="436" y="180" text-anchor="middle">SGi</text>

  <g class="c-gray"><rect x="444" y="160" width="80" height="60" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="484" y="184" text-anchor="middle">Internet</text>
  <text class="ts" x="484" y="202" text-anchor="middle">IP public</text>

  <line x1="524" y1="190" x2="540" y2="190" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="532" y="180" text-anchor="middle">IP</text>

  <g class="c-blue"><rect x="540" y="160" width="80" height="60" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="580" y="184" text-anchor="middle">Serveur</text>
  <text class="ts" x="580" y="202" text-anchor="middle">app distante</text>

  <text class="ts" x="50" y="262" text-anchor="start">eNB ↔ eNB :</text>
  <text class="ts" x="120" y="262" text-anchor="start" fill="#3d3d3a">X2 (LTE) / Xn (5G NR) — handover, ICIC, dual connectivity</text>

  <text class="ts" x="50" y="282" text-anchor="start">Plan utilisateur :</text>
  <text class="ts" x="140" y="282" text-anchor="start" fill="#3d3d3a">le paquet IP de l'UE est tunnellisé en GTP-U entre eNB et P-GW, libéré sur SGi</text>

  <text class="ts" x="50" y="302" text-anchor="start">Plan contrôle :</text>
  <text class="ts" x="140" y="302" text-anchor="start" fill="#3d3d3a">S1-AP/NAS sur SCTP/IP — attach, auth, mobilité, paging</text>

  <text class="ts" x="340" y="334" text-anchor="middle">5G : eNB → gNB, MME → AMF, S-GW + P-GW → UPF, S1 → N2/N3, SGi → N6.</text>

</svg>
