<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" role="img" width="100%">
  <title>De R2 aux pixels affichés «2»</title>
  <desc>L'entier binaire 10 calculé dans R2 traverse plusieurs représentations : caractère ASCII, glyph rasterisé en bitmap, pixels physiques sur le moniteur.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #3d3d3a; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; fill: #6c6b66; }
    .th { font-size: 14px; font-weight: 500; }

    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   .th, .c-blue   .t { fill: #0C447C; }
    .c-blue   .ts { fill: #185FA5; }

    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   .th, .c-teal   .t { fill: #085041; }
    .c-teal   .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th, .c-purple .t { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  .th, .c-amber  .t { fill: #633806; }
    .c-amber  .ts { fill: #854F0B; }

    .c-gray   rect, .c-gray   circle, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   .th, .c-gray   .t { fill: #444441; }
    .c-gray   .ts { fill: #5F5E5A; }

    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral  .th, .c-coral  .t { fill: #712B13; }
    .c-coral  .ts { fill: #993C1D; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="36" text-anchor="middle">Du registre aux pixels</text>

  <g class="c-purple"><rect x="40" y="70" width="140" height="130" rx="8" stroke-width="0.5"/></g>
  <text class="th" x="110" y="98" text-anchor="middle">Registre R2</text>
  <text class="ts" x="110" y="116" text-anchor="middle">entier dans le CPU</text>
  <text x="110" y="170" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#3d3d3a" text-anchor="middle">0b10</text>

  <line x1="180" y1="135" x2="205" y2="135" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="192" y="125" text-anchor="middle">printf</text>

  <g class="c-blue"><rect x="205" y="70" width="140" height="130" rx="8" stroke-width="0.5"/></g>
  <text class="th" x="275" y="98" text-anchor="middle">ASCII '2'</text>
  <text class="ts" x="275" y="116" text-anchor="middle">1 octet</text>
  <text x="275" y="170" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#3d3d3a" text-anchor="middle">0x32</text>

  <line x1="345" y1="135" x2="370" y2="135" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="357" y="125" text-anchor="middle">driver</text>

  <g class="c-teal"><rect x="370" y="70" width="140" height="130" rx="8" stroke-width="0.5"/></g>
  <text class="th" x="440" y="98" text-anchor="middle">Glyph rasterisé</text>
  <text class="ts" x="440" y="116" text-anchor="middle">matrice 8×14</text>
  <g transform="translate(420, 130)">
    <rect x="0" y="0" width="40" height="56" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="0.5"/>
    <rect x="8" y="6" width="24" height="4" fill="#3d3d3a"/>
    <rect x="28" y="10" width="4" height="8" fill="#3d3d3a"/>
    <rect x="22" y="18" width="10" height="4" fill="#3d3d3a"/>
    <rect x="14" y="22" width="8" height="4" fill="#3d3d3a"/>
    <rect x="8" y="26" width="6" height="4" fill="#3d3d3a"/>
    <rect x="4" y="30" width="6" height="4" fill="#3d3d3a"/>
    <rect x="4" y="42" width="32" height="4" fill="#3d3d3a"/>
  </g>

  <line x1="510" y1="135" x2="535" y2="135" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="522" y="125" text-anchor="middle">HDMI</text>

  <g class="c-amber"><rect x="535" y="70" width="105" height="130" rx="8" stroke-width="0.5"/></g>
  <text class="th" x="587" y="98" text-anchor="middle">Écran</text>
  <text class="ts" x="587" y="116" text-anchor="middle">photons</text>
  <g transform="translate(567, 130)">
    <rect x="0" y="0" width="40" height="56" fill="#161613" stroke="#3d3d3a" stroke-width="0.5"/>
    <rect x="8" y="6" width="24" height="4" fill="#f5f5f0"/>
    <rect x="28" y="10" width="4" height="8" fill="#f5f5f0"/>
    <rect x="22" y="18" width="10" height="4" fill="#f5f5f0"/>
    <rect x="14" y="22" width="8" height="4" fill="#f5f5f0"/>
    <rect x="8" y="26" width="6" height="4" fill="#f5f5f0"/>
    <rect x="4" y="30" width="6" height="4" fill="#f5f5f0"/>
    <rect x="4" y="42" width="32" height="4" fill="#f5f5f0"/>
  </g>

  <text class="ts" x="340" y="232" text-anchor="middle">Même valeur, quatre représentations consécutives</text>
  <text class="ts" x="340" y="252" text-anchor="middle">chaque couche ignore totalement les suivantes</text>
  <text class="ts" x="340" y="278" text-anchor="middle">l'additionneur ne sait pas qu'il additionne, le pixel ne sait pas qu'il est un '2'</text>

</svg>
