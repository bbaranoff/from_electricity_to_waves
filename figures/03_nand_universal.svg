<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" role="img" width="100%">
  <title>La porte NAND et son universalité</title>
  <desc>Le symbole de la porte NAND avec sa table de vérité, et comment NOT, AND, OR se construisent uniquement avec des NAND.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #3d3d3a; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; fill: #6c6b66; }
    .th { font-size: 14px; font-weight: 500; }

    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   .th, .c-blue   .t { fill: #0C447C; }
    .c-blue   .ts { fill: #185FA5; }

    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   .th, .c-teal   .t { fill: #085041; }
    .c-teal   .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th, .c-purple .t { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  .th, .c-amber  .t { fill: #633806; }
    .c-amber  .ts { fill: #854F0B; }

    .c-gray   rect, .c-gray   circle, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   .th, .c-gray   .t { fill: #444441; }
    .c-gray   .ts { fill: #5F5E5A; }

    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral  .th, .c-coral  .t { fill: #712B13; }
    .c-coral  .ts { fill: #993C1D; }
  </style>

  <text class="th" x="160" y="40" text-anchor="middle">Porte NAND</text>
  <text class="ts" x="160" y="58" text-anchor="middle">NOT(A AND B)</text>

  <path d="M 100 90 L 160 90 A 35 35 0 0 1 160 160 L 100 160 Z" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1.5"/>
  <circle cx="205" cy="125" r="6" fill="#FFFFFF" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="70" y1="105" x2="100" y2="105" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="70" y1="145" x2="100" y2="145" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="62" y="109" text-anchor="end">A</text>
  <text class="ts" x="62" y="149" text-anchor="end">B</text>
  <line x1="211" y1="125" x2="250" y2="125" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="258" y="129">Y</text>

  <g class="c-purple"><rect x="60" y="200" width="200" height="100" rx="8" stroke-width="0.5"/></g>
  <text class="ts" x="100" y="224" text-anchor="middle">A</text>
  <text class="ts" x="160" y="224" text-anchor="middle">B</text>
  <text class="ts" x="220" y="224" text-anchor="middle">Y</text>
  <line x1="70" y1="232" x2="250" y2="232" stroke="#3d3d3a" stroke-width="0.5"/>
  <text class="ts" x="100" y="250" text-anchor="middle">0</text><text class="ts" x="160" y="250" text-anchor="middle">0</text><text class="ts" x="220" y="250" text-anchor="middle">1</text>
  <text class="ts" x="100" y="266" text-anchor="middle">0</text><text class="ts" x="160" y="266" text-anchor="middle">1</text><text class="ts" x="220" y="266" text-anchor="middle">1</text>
  <text class="ts" x="100" y="282" text-anchor="middle">1</text><text class="ts" x="160" y="282" text-anchor="middle">0</text><text class="ts" x="220" y="282" text-anchor="middle">1</text>
  <text class="ts" x="100" y="298" text-anchor="middle">1</text><text class="ts" x="160" y="298" text-anchor="middle">1</text><text class="ts" x="220" y="298" text-anchor="middle">0</text>

  <text class="th" x="480" y="40" text-anchor="middle">Universalité</text>
  <text class="ts" x="480" y="58" text-anchor="middle">tout se construit en NAND</text>

  <g class="c-teal"><rect x="320" y="80" width="320" height="220" rx="10" stroke-width="0.5"/></g>

  <text class="ts" x="345" y="118">NOT(A)</text>
  <text class="t" x="490" y="118">= NAND(A, A)</text>

  <text class="ts" x="345" y="158">AND(A,B)</text>
  <text class="t" x="490" y="158">= NOT(NAND(A,B))</text>

  <text class="ts" x="345" y="198">OR(A,B)</text>
  <text class="t" x="490" y="198">= NAND(NOT A, NOT B)</text>

  <text class="ts" x="345" y="238">XOR, additionneur,</text>
  <text class="t" x="490" y="238">= compositions de NAND</text>

  <text class="ts" x="345" y="276">algèbre booléenne</text>
  <text class="t" x="490" y="276">= aucun transistor visible</text>

</svg>
