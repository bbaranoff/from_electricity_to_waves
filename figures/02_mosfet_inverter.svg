<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" role="img" width="100%">
  <title>Du MOSFET à l'inverseur CMOS</title>
  <desc>Un transistor MOSFET utilisé comme interrupteur, combiné en paire complémentaire PMOS-NMOS pour former un inverseur, et la convention de tension qui définit le bit.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #3d3d3a; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; fill: #6c6b66; }
    .th { font-size: 14px; font-weight: 500; }

    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   .th, .c-blue   .t { fill: #0C447C; }
    .c-blue   .ts { fill: #185FA5; }

    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   .th, .c-teal   .t { fill: #085041; }
    .c-teal   .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th, .c-purple .t { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  .th, .c-amber  .t { fill: #633806; }
    .c-amber  .ts { fill: #854F0B; }

    .c-gray   rect, .c-gray   circle, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   .th, .c-gray   .t { fill: #444441; }
    .c-gray   .ts { fill: #5F5E5A; }

    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral  .th, .c-coral  .t { fill: #712B13; }
    .c-coral  .ts { fill: #993C1D; }
  </style>

  <text class="th" x="120" y="40" text-anchor="middle">MOSFET</text>
  <text class="ts" x="120" y="58" text-anchor="middle">Interrupteur contrôlé</text>

  <rect x="80" y="90" width="80" height="100" rx="6" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="120" y="144" text-anchor="middle">canal</text>
  <line x1="40" y1="140" x2="80" y2="140" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="52" y="134" text-anchor="middle">G</text>
  <line x1="120" y1="70" x2="120" y2="90" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="130" y="78">D</text>
  <line x1="120" y1="190" x2="120" y2="210" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="130" y="206">S</text>

  <text class="ts" x="120" y="240" text-anchor="middle">Vg &gt; Vth → passant</text>
  <text class="ts" x="120" y="258" text-anchor="middle">Vg &lt; Vth → bloqué</text>

  <text class="th" x="350" y="40" text-anchor="middle">Inverseur CMOS</text>
  <text class="ts" x="350" y="58" text-anchor="middle">PMOS + NMOS complémentaires</text>

  <line x1="290" y1="80" x2="410" y2="80" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="282" y="84" text-anchor="end">VDD</text>

  <rect x="330" y="100" width="40" height="36" rx="4" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="350" y="122" text-anchor="middle">PMOS</text>
  <line x1="350" y1="80" x2="350" y2="100" stroke="#3d3d3a" stroke-width="1.5"/>

  <rect x="330" y="180" width="40" height="36" rx="4" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="350" y="202" text-anchor="middle">NMOS</text>

  <line x1="350" y1="136" x2="350" y2="180" stroke="#3d3d3a" stroke-width="1.5"/>
  <circle cx="350" cy="158" r="3" fill="#3d3d3a"/>
  <line x1="350" y1="158" x2="430" y2="158" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="440" y="162">OUT</text>

  <line x1="290" y1="240" x2="410" y2="240" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="282" y="244" text-anchor="end">GND</text>
  <line x1="350" y1="216" x2="350" y2="240" stroke="#3d3d3a" stroke-width="1.5"/>

  <line x1="270" y1="158" x2="305" y2="118" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="270" y1="158" x2="305" y2="198" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="305" y1="118" x2="330" y2="118" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="305" y1="198" x2="330" y2="198" stroke="#3d3d3a" stroke-width="1.5"/>
  <circle cx="270" cy="158" r="3" fill="#3d3d3a"/>
  <text class="ts" x="260" y="162" text-anchor="end">IN</text>

  <text class="th" x="570" y="40" text-anchor="middle">Naissance du bit</text>
  <text class="ts" x="570" y="58" text-anchor="middle">Convention de seuil</text>

  <g class="c-amber"><rect x="490" y="100" width="160" height="50" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="510" y="130">1</text>
  <text class="ts" x="570" y="130" text-anchor="middle">tension haute</text>
  <text class="ts" x="640" y="130" text-anchor="end">≈ VDD</text>

  <line x1="490" y1="170" x2="650" y2="170" stroke="#3d3d3a" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text class="ts" x="660" y="174">Vth</text>

  <g class="c-blue"><rect x="490" y="190" width="160" height="50" rx="6" stroke-width="0.5"/></g>
  <text class="th" x="510" y="220">0</text>
  <text class="ts" x="570" y="220" text-anchor="middle">tension basse</text>
  <text class="ts" x="640" y="220" text-anchor="end">≈ 0 V</text>

  <text class="ts" x="570" y="270" text-anchor="middle">Le numérique est une</text>
  <text class="ts" x="570" y="286" text-anchor="middle">discrétisation conventionnelle</text>

</svg>
