<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img" width="100%">
  <title>Transceiver SDR full-duplex</title>
  <desc>Deux chaînes parallèles partageant une antenne via duplexer ou switch T/R : TX (DSP, DAC, LPF, mixeur d'upconversion, PA) et RX (LNA, mixeur de downconversion, LPF, ADC, DSP).</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; fill: #3d3d3a; }
    .t  { font-size: 14px; }
    .ts { font-size: 12px; fill: #6c6b66; }
    .th { font-size: 14px; font-weight: 500; }

    .c-blue   rect, .c-blue   circle, .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   .th, .c-blue   .t { fill: #0C447C; }
    .c-blue   .ts { fill: #185FA5; }

    .c-teal   rect, .c-teal   circle, .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   .th, .c-teal   .t { fill: #085041; }
    .c-teal   .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th, .c-purple .t { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-amber  rect, .c-amber  circle, .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  .th, .c-amber  .t { fill: #633806; }
    .c-amber  .ts { fill: #854F0B; }

    .c-gray   rect, .c-gray   circle, .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   .th, .c-gray   .t { fill: #444441; }
    .c-gray   .ts { fill: #5F5E5A; }

    .c-coral  rect, .c-coral  circle, .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral  .th, .c-coral  .t { fill: #712B13; }
    .c-coral  .ts { fill: #993C1D; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="32" text-anchor="middle">Transceiver SDR full-duplex</text>

  <text class="ts" x="60" y="98" text-anchor="middle">bits TX</text>
  <line x1="22" y1="120" x2="42" y2="120" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g class="c-purple"><rect x="42" y="100" width="70" height="40" rx="6" stroke-width="0.5"/></g>
  <text class="ts" x="77" y="124" text-anchor="middle">DSP</text>
  <line x1="112" y1="120" x2="142" y2="120" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g class="c-blue"><rect x="142" y="100" width="50" height="40" rx="6" stroke-width="0.5"/></g>
  <text class="ts" x="167" y="124" text-anchor="middle">DAC</text>
  <line x1="192" y1="120" x2="217" y2="120" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="217" y="100" width="50" height="40" rx="4" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="242" y="124" text-anchor="middle">LPF</text>
  <line x1="267" y1="120" x2="298" y2="120" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="320" cy="120" r="18" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="307" y1="107" x2="333" y2="133" stroke="#3d3d3a" stroke-width="1"/>
  <line x1="307" y1="133" x2="333" y2="107" stroke="#3d3d3a" stroke-width="1"/>
  <line x1="320" y1="76" x2="320" y2="102" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="320" y="70" text-anchor="middle">LO Tx</text>
  <line x1="338" y1="120" x2="365" y2="120" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="365,100 365,140 405,120" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="385" y="158" text-anchor="middle">PA</text>
  <line x1="405" y1="120" x2="442" y2="120" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g class="c-amber"><rect x="442" y="100" width="60" height="160" rx="8" stroke-width="0.5"/></g>
  <text class="th" x="472" y="178" text-anchor="middle">Duplexer</text>
  <text class="ts" x="472" y="196" text-anchor="middle">FDD / TDD</text>

  <line x1="502" y1="180" x2="540" y2="180" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="540" y1="180" x2="540" y2="120" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="540" y1="120" x2="525" y2="100" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="540" y1="120" x2="555" y2="100" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="540" y="220" text-anchor="middle">Antenne</text>

  <line x1="442" y1="240" x2="409" y2="240" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="405,220 405,260 365,240" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="385" y="280" text-anchor="middle">LNA</text>
  <line x1="365" y1="240" x2="338" y2="240" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <circle cx="320" cy="240" r="18" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1.5"/>
  <line x1="307" y1="227" x2="333" y2="253" stroke="#3d3d3a" stroke-width="1"/>
  <line x1="307" y1="253" x2="333" y2="227" stroke="#3d3d3a" stroke-width="1"/>
  <line x1="320" y1="258" x2="320" y2="282" stroke="#3d3d3a" stroke-width="1.5"/>
  <text class="ts" x="320" y="296" text-anchor="middle">LO Rx</text>
  <line x1="302" y1="240" x2="272" y2="240" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="217" y="220" width="50" height="40" rx="4" fill="#F6F5EE" stroke="#3d3d3a" stroke-width="1"/>
  <text class="ts" x="242" y="244" text-anchor="middle">LPF</text>
  <line x1="217" y1="240" x2="197" y2="240" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g class="c-blue"><rect x="142" y="220" width="50" height="40" rx="6" stroke-width="0.5"/></g>
  <text class="ts" x="167" y="244" text-anchor="middle">ADC</text>
  <line x1="142" y1="240" x2="117" y2="240" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g class="c-purple"><rect x="42" y="220" width="70" height="40" rx="6" stroke-width="0.5"/></g>
  <text class="ts" x="77" y="244" text-anchor="middle">DSP</text>
  <line x1="42" y1="240" x2="22" y2="240" stroke="#3d3d3a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="60" y="278" text-anchor="middle">bits RX</text>

  <text class="ts" x="60" y="80" text-anchor="middle" fill="#6c6b66">— TX : bits → onde —</text>
  <text class="ts" x="60" y="312" text-anchor="middle" fill="#6c6b66">— RX : onde → bits —</text>

  <text class="ts" x="340" y="334" text-anchor="middle">FDD : TX et RX simultanés sur fréquences distinctes (duplexer = filtre).      TDD : alternance temporelle (switch T/R).</text>

</svg>
